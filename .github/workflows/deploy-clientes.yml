name: Deploy → Clientes

# Disparado manualmente no GitHub → Actions → "Deploy → Clientes" → Run workflow
on:
  workflow_dispatch:
    inputs:
      cliente:
        description: 'Qual cliente atualizar?'
        required: true
        type: choice
        options:
          - jkr          # JKR Imóveis — jkrimoveispinda.com.br
          # Adicione novos clientes aqui no futuro

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Build (compartilhado por todos os clientes)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build:
    name: Build Next.js
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Instalar dependências
        working-directory: app
        run: npm ci

      - name: Build Next.js
        working-directory: app
        env:
          NEXT_TELEMETRY_DISABLED: 1
          DATABASE_URL: "mysql://fake:fake@localhost:3306/fake"
        run: npm run build

      - name: Compactar .next
        working-directory: app
        run: zip -r ${{ github.workspace }}/next-build.zip .next

      - name: Salvar artefato de build
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: next-build.zip
          retention-days: 1

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Deploy JKR Imóveis via cPanel UAPI (HTTPS porta 2083)
#
# Abordagem 100% via cPanel UAPI — sem PHP intermediário:
#   1. Sobe o zip com nome único por run (evita conflito)
#   2. Extrai via Fileman/extract_archive
#   3. Reinicia Passenger via Fileman/save_file_content (tmp/restart.txt)
#   4. Limpa o zip via Fileman/delete_files (best-effort)
#
# Toda comunicação usa HTTPS (porta 443/2083) — nunca bloqueada por firewall.
# Não usa PHP, não usa SSH — só cPanel UAPI com token de autenticação.
#
# Secrets necessários (GitHub → Settings → Secrets → Actions):
#   JKR_CPANEL_USER   → jkrimoveis
#   JKR_CPANEL_TOKEN  → API token criado no cPanel (Security → API Tokens)
# ─────────────────────────────────────────────────────────────────────────────
  deploy-jkr:
    name: Deploy JKR Imóveis
    needs: build
    if: github.event.inputs.cliente == 'jkr'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CPANEL_HOST: jkrimoveispinda.com.br:2083
      CPANEL_USER: ${{ secrets.JKR_CPANEL_USER }}
      CPANEL_TOKEN: ${{ secrets.JKR_CPANEL_TOKEN }}
      REMOTE_PATH: /public_html/vitrineimob
      SITE_URL: https://jkrimoveispinda.com.br/vitrineimob
      DEPLOY_ZIP: deploy-${{ github.run_id }}.zip

    steps:
      - name: Baixar artefato de build
        uses: actions/download-artifact@v4
        with:
          name: next-build

      - name: Verificar zip
        run: |
          echo "=== Tamanho: $(du -sh next-build.zip | cut -f1) ==="
          echo "=== Arquivos: $(unzip -l next-build.zip | tail -1) ==="

      - name: Upload zip do build
        run: |
          echo "=== Enviando $DEPLOY_ZIP ($(du -sh next-build.zip | cut -f1)) ==="
          RESPONSE=$(curl -sk \
            -H "Authorization: cpanel $CPANEL_USER:$CPANEL_TOKEN" \
            -F "dir=$REMOTE_PATH" \
            -F "file-1=@next-build.zip;filename=$DEPLOY_ZIP" \
            "https://$CPANEL_HOST/execute/Fileman/upload_files")
          echo "Resposta: $RESPONSE"
          STATUS=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status',0))" 2>/dev/null || echo "0")
          if [ "$STATUS" != "1" ]; then
            echo "ERRO: upload do zip falhou — resposta acima"
            exit 1
          fi

      - name: Extrair zip via cPanel API
        run: |
          echo "=== Extraindo $DEPLOY_ZIP em $REMOTE_PATH ==="
          RESPONSE=$(curl -sk \
            -H "Authorization: cpanel $CPANEL_USER:$CPANEL_TOKEN" \
            -d "dir=$REMOTE_PATH" \
            -d "file=$DEPLOY_ZIP" \
            "https://$CPANEL_HOST/execute/Fileman/extract_archive")
          echo "Resposta: $RESPONSE"
          STATUS=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status',0))" 2>/dev/null || echo "0")
          if [ "$STATUS" != "1" ]; then
            echo "ERRO: extração falhou — resposta acima"
            exit 1
          fi
          echo "=== Extração concluída ==="

      - name: Reiniciar Passenger (tmp/restart.txt)
        run: |
          echo "=== Reiniciando Passenger ==="
          RESPONSE=$(curl -sk \
            -H "Authorization: cpanel $CPANEL_USER:$CPANEL_TOKEN" \
            --data-urlencode "dir=$REMOTE_PATH/tmp" \
            --data-urlencode "filename=restart.txt" \
            --data-urlencode "content=restarted at $(date -u)" \
            "https://$CPANEL_HOST/execute/Fileman/save_file_content")
          echo "Resposta: $RESPONSE"
          echo "=== Passenger reiniciado ==="

      - name: Limpar zip do servidor
        run: |
          echo "=== Removendo $DEPLOY_ZIP do servidor ==="
          curl -sk \
            -H "Authorization: cpanel $CPANEL_USER:$CPANEL_TOKEN" \
            -d "files[0][path]=$REMOTE_PATH" \
            -d "files[0][name]=$DEPLOY_ZIP" \
            "https://$CPANEL_HOST/execute/Fileman/delete_files" || true
          echo "Limpeza concluída"

      - name: Verificar site após deploy
        run: |
          sleep 10
          HTTP_CODE=$(curl -sk -o /dev/null -w "%{http_code}" "$SITE_URL" || echo "000")
          echo "HTTP status JKR: $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "301" ] || [ "$HTTP_CODE" = "302" ]; then
            echo "=== Deploy JKR finalizado com sucesso em $(date -u) ==="
          else
            echo "AVISO: site retornou HTTP $HTTP_CODE — pode estar reiniciando"
          fi

# ─────────────────────────────────────────────────────────────────────────────
# Para adicionar novos clientes, copie o bloco "deploy-jkr",
# renomeie para "deploy-NOMECLIENTE", ajuste if:, CPANEL_HOST, REMOTE_PATH,
# SITE_URL e crie os secrets correspondentes no GitHub.
# ─────────────────────────────────────────────────────────────────────────────
