name: Deploy → Clientes

# Disparado manualmente no GitHub → Actions → "Deploy → Clientes" → Run workflow
on:
  workflow_dispatch:
    inputs:
      cliente:
        description: 'Qual cliente atualizar?'
        required: true
        type: choice
        options:
          - jkr          # JKR Imóveis — cPanel sem SSH (HTTPS via cPanel UAPI)
          # Adicione novos clientes aqui no futuro

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Build (compartilhado por todos os clientes)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build:
    name: Build Next.js
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Instalar dependências
        working-directory: app
        run: npm ci

      - name: Build Next.js
        working-directory: app
        env:
          NEXT_TELEMETRY_DISABLED: 1
          DATABASE_URL: "mysql://fake:fake@localhost:3306/fake"
        run: npm run build

      - name: Compactar .next
        working-directory: app
        run: zip -r ${{ github.workspace }}/next-build.zip .next

      - name: Salvar artefato de build
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: next-build.zip
          retention-days: 1

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Deploy JKR Imóveis via cPanel UAPI (HTTPS)
#
# Abordagem:
#   1. Faz upload de um script PHP temporário via cPanel Fileman API
#   2. Faz upload do zip do build via cPanel Fileman API
#   3. Chama o PHP via HTTP para extrair o zip no servidor
#   4. O PHP toca tmp/restart.txt para reiniciar Passenger e se auto-deleta
#
# Vantagem: usa apenas HTTPS (porta 443/2083) — nunca bloqueada por firewalls.
# Sem dependência de SSH, FTP ou funções específicas do cPanel.
#
# Secrets necessários em github.com → Settings → Secrets → Actions:
#   JKR_CPANEL_USER  → usuário cPanel (ex: jkrimoveis)
#   JKR_CPANEL_PASS  → senha cPanel
#
# Variáveis do servidor:
#   CPANEL_HOST  → hostname:porta do cPanel (porta 2083)
#   REMOTE_PATH  → caminho no servidor para upload (relativo ao home do usuário)
#   SITE_URL     → URL pública do site (para acionar o PHP extrator)
# ─────────────────────────────────────────────────────────────────────────────
  deploy-jkr:
    name: Deploy JKR Imóveis
    needs: build
    if: github.event.inputs.cliente == 'jkr'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CPANEL_HOST: jkrimoveispinda.com.br:2083
      CPANEL_USER: ${{ secrets.JKR_CPANEL_USER }}
      CPANEL_PASS: ${{ secrets.JKR_CPANEL_PASS }}
      REMOTE_PATH: /public_html/vitrineimob
      SITE_URL: https://jkrimoveispinda.com.br

    steps:
      - name: Baixar artefato de build
        uses: actions/download-artifact@v4
        with:
          name: next-build

      - name: Verificar zip
        run: |
          echo "=== Tamanho do zip: $(du -sh next-build.zip | cut -f1) ==="
          echo "=== Arquivos no zip: $(unzip -l next-build.zip | tail -1) ==="

      - name: Criar script PHP extrator
        run: |
          cat > /tmp/_extract.php << 'PHPEOF'
          <?php
          // Script temporário de extração — auto-deleta após uso
          $dir   = __DIR__;
          $zip   = $dir . '/next-build.zip';
          $touch = $dir . '/tmp/restart.txt';

          if (!file_exists($zip)) {
              http_response_code(404);
              die("ZIP not found: $zip");
          }

          $z = new ZipArchive();
          if ($z->open($zip) !== TRUE) {
              http_response_code(500);
              die("Failed to open zip");
          }

          $z->extractTo($dir);
          $z->close();

          // Reinicia Passenger
          @mkdir(dirname($touch), 0755, true);
          file_put_contents($touch, date('c'));

          // Limpeza
          @unlink($zip);
          @unlink(__FILE__);

          echo "OK";
          PHPEOF

      - name: Upload script PHP extrator
        run: |
          echo "=== Enviando _extract.php para o servidor ==="
          RESPONSE=$(curl -sk \
            -u "$CPANEL_USER:$CPANEL_PASS" \
            -F "dir=$REMOTE_PATH" \
            -F "file-1=@/tmp/_extract.php;filename=_extract.php" \
            "https://$CPANEL_HOST/execute/Fileman/upload_files")
          echo "Resposta: $RESPONSE"
          STATUS=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status',0))" 2>/dev/null || echo "0")
          if [ "$STATUS" != "1" ]; then
            echo "ERRO: upload do PHP falhou"
            exit 1
          fi

      - name: Upload zip do build
        run: |
          echo "=== Enviando next-build.zip ($(du -sh next-build.zip | cut -f1)) ==="
          RESPONSE=$(curl -sk \
            -u "$CPANEL_USER:$CPANEL_PASS" \
            -F "dir=$REMOTE_PATH" \
            -F "file-1=@next-build.zip;filename=next-build.zip" \
            "https://$CPANEL_HOST/execute/Fileman/upload_files")
          echo "Resposta: $RESPONSE"
          STATUS=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status',0))" 2>/dev/null || echo "0")
          if [ "$STATUS" != "1" ]; then
            echo "ERRO: upload do zip falhou"
            exit 1
          fi

      - name: Acionar extração via PHP
        run: |
          echo "=== Aguardando 5s para upload propagar... ==="
          sleep 5
          echo "=== Chamando script PHP para extrair o zip ==="
          RESULT=$(curl -sf --max-time 120 "$SITE_URL/_extract.php" 2>&1 || echo "CURL_ERROR: $?")
          echo "Resultado: $RESULT"
          if [ "$RESULT" != "OK" ]; then
            echo "ERRO: extração falhou. Verifique os logs acima."
            exit 1
          fi
          echo "=== Extração concluída com sucesso! ==="

      - name: Verificar site após deploy
        run: |
          sleep 5
          HTTP_CODE=$(curl -sk -o /dev/null -w "%{http_code}" "$SITE_URL" || echo "000")
          echo "HTTP status do site JKR: $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "301" ] || [ "$HTTP_CODE" = "302" ]; then
            echo "=== Deploy JKR finalizado com sucesso em $(date -u) ==="
          else
            echo "AVISO: site retornou HTTP $HTTP_CODE — pode estar reiniciando"
          fi

# ─────────────────────────────────────────────────────────────────────────────
# Para adicionar novos clientes, copie o bloco "deploy-jkr" acima,
# renomeie para "deploy-NOMECLIENTE", ajuste if:, CPANEL_HOST, REMOTE_PATH e SITE_URL.
# Adicione o novo cliente na lista options: no topo do arquivo.
# ─────────────────────────────────────────────────────────────────────────────
