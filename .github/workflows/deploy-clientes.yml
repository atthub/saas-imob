name: Deploy → Clientes

# Disparado manualmente no GitHub → Actions → "Deploy → Clientes" → Run workflow
on:
  workflow_dispatch:
    inputs:
      cliente:
        description: 'Qual cliente atualizar?'
        required: true
        type: choice
        options:
          - jkr          # JKR Imóveis — jkrimoveispinda.com.br
          # Adicione novos clientes aqui no futuro

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Build (compartilhado por todos os clientes)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build:
    name: Build Next.js
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Instalar dependências
        working-directory: app
        run: npm ci

      - name: Build Next.js
        working-directory: app
        env:
          NEXT_TELEMETRY_DISABLED: 1
          DATABASE_URL: "mysql://fake:fake@localhost:3306/fake"
        run: npm run build

      - name: Compactar .next
        working-directory: app
        run: zip -r ${{ github.workspace }}/next-build.zip .next

      - name: Salvar artefato de build
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: next-build.zip
          retention-days: 1

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Deploy JKR Imóveis via cPanel UAPI (HTTPS porta 2083)
#
# Estratégia:
#   O PHP NÃO vai para /public_html/vitrineimob/ — Phusion Passenger
#   intercepta todos os requests desse diretório (Next.js app).
#
#   Solução: PHP vai para /public_html/ (raiz, PHP normal).
#   O zip vai para /public_html/vitrineimob/ (onde o Next.js roda).
#   O PHP lê o zip de vitrineimob/ e extrai lá mesmo.
#   O PHP é chamado via https://dominio.com.br/_deploy-RUNID.php
#
#   Ambos usam nome único por run_id — sem conflito em re-execuções.
#
# Secrets necessários:
#   JKR_CPANEL_USER   → jkrimoveis
#   JKR_CPANEL_TOKEN  → API token do cPanel
# ─────────────────────────────────────────────────────────────────────────────
  deploy-jkr:
    name: Deploy JKR Imóveis
    needs: build
    if: github.event.inputs.cliente == 'jkr'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CPANEL_HOST: jkrimoveispinda.com.br:2083
      CPANEL_USER: ${{ secrets.JKR_CPANEL_USER }}
      CPANEL_TOKEN: ${{ secrets.JKR_CPANEL_TOKEN }}
      REMOTE_ROOT: /public_html             # PHP vai aqui — servido normalmente
      REMOTE_APP:  /public_html/vitrineimob # ZIP vai aqui — Next.js app
      SITE_ROOT:   https://jkrimoveispinda.com.br
      SITE_URL:    https://jkrimoveispinda.com.br/vitrineimob
      DEPLOY_ZIP:  deploy-${{ github.run_id }}.zip
      DEPLOY_PHP:  _deploy-${{ github.run_id }}.php

    steps:
      - name: Checkout (para acessar .github/scripts)
        uses: actions/checkout@v4

      - name: Baixar artefato de build
        uses: actions/download-artifact@v4
        with:
          name: next-build

      - name: Verificar zip
        run: |
          echo "=== Tamanho: $(du -sh next-build.zip | cut -f1) ==="
          echo "=== Arquivos: $(unzip -l next-build.zip | tail -1) ==="

      - name: Upload PHP extrator (para /public_html/ — fora do Passenger)
        run: |
          echo "=== Enviando $DEPLOY_PHP para $REMOTE_ROOT ==="
          RESPONSE=$(curl -sk \
            -H "Authorization: cpanel $CPANEL_USER:$CPANEL_TOKEN" \
            -F "dir=$REMOTE_ROOT" \
            -F "file-1=@.github/scripts/_deploy.php;filename=$DEPLOY_PHP" \
            "https://$CPANEL_HOST/execute/Fileman/upload_files")
          echo "Resposta: $RESPONSE"
          STATUS=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status',0))" 2>/dev/null || echo "0")
          if [ "$STATUS" != "1" ]; then
            echo "ERRO: upload do PHP falhou"
            exit 1
          fi

      - name: Upload zip do build (para /public_html/vitrineimob/)
        run: |
          echo "=== Enviando $DEPLOY_ZIP ($(du -sh next-build.zip | cut -f1)) para $REMOTE_APP ==="
          RESPONSE=$(curl -sk \
            -H "Authorization: cpanel $CPANEL_USER:$CPANEL_TOKEN" \
            -F "dir=$REMOTE_APP" \
            -F "file-1=@next-build.zip;filename=$DEPLOY_ZIP" \
            "https://$CPANEL_HOST/execute/Fileman/upload_files")
          echo "Resposta: $RESPONSE"
          STATUS=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status',0))" 2>/dev/null || echo "0")
          if [ "$STATUS" != "1" ]; then
            echo "ERRO: upload do zip falhou"
            exit 1
          fi

      - name: Acionar extração via PHP
        run: |
          sleep 3
          echo "=== Chamando $SITE_ROOT/$DEPLOY_PHP?zip=$DEPLOY_ZIP ==="
          RESULT=$(curl -sf --max-time 180 "$SITE_ROOT/$DEPLOY_PHP?zip=$DEPLOY_ZIP" 2>&1 || echo "CURL_ERROR: $?")
          echo "Resultado: $RESULT"
          if [ "$RESULT" != "OK" ]; then
            echo "ERRO: extração falhou"
            exit 1
          fi
          echo "=== Extração e restart concluídos ==="

      - name: Verificar site após deploy
        run: |
          sleep 10
          HTTP_CODE=$(curl -sk -o /dev/null -w "%{http_code}" "$SITE_URL" || echo "000")
          echo "HTTP status JKR: $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "301" ] || [ "$HTTP_CODE" = "302" ]; then
            echo "=== Deploy JKR finalizado com sucesso em $(date -u) ==="
          else
            echo "AVISO: site retornou HTTP $HTTP_CODE — pode estar reiniciando"
          fi

# ─────────────────────────────────────────────────────────────────────────────
# Para adicionar novos clientes, copie o bloco "deploy-jkr",
# renomeie para "deploy-NOMECLIENTE", ajuste if:, CPANEL_HOST, REMOTE_ROOT,
# REMOTE_APP, SITE_ROOT, SITE_URL e crie os secrets correspondentes.
# ─────────────────────────────────────────────────────────────────────────────
