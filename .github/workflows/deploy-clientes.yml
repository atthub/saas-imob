name: Deploy → Clientes

# Disparado manualmente no GitHub → Actions → "Deploy → Clientes" → Run workflow
on:
  workflow_dispatch:
    inputs:
      cliente:
        description: 'Qual cliente atualizar?'
        required: true
        type: choice
        options:
          - jkr          # JKR Imóveis — jkrimoveispinda.com.br
          # Adicione novos clientes aqui no futuro

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Build (compartilhado por todos os clientes)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build:
    name: Build Next.js
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Instalar dependências
        working-directory: app
        run: npm ci

      - name: Build Next.js
        working-directory: app
        env:
          NEXT_TELEMETRY_DISABLED: 1
          DATABASE_URL: "mysql://fake:fake@localhost:3306/fake"
        run: npm run build

      - name: Compactar .next
        working-directory: app
        run: zip -r ${{ github.workspace }}/next-build.zip .next

      - name: Salvar artefato de build
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: next-build.zip
          retention-days: 1

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Deploy JKR Imóveis via SSH
#
# Secrets necessários em github.com → Settings → Secrets → Actions:
#   JKR_SSH_KEY  → chave privada SSH (~/.ssh/github_actions_deploy)
#
# Servidor: 128.201.75.100, porta 1158, usuário jkrimoveis
# Site:     ~/public_html/vitrineimob
# ─────────────────────────────────────────────────────────────────────────────
  deploy-jkr:
    name: Deploy JKR Imóveis
    needs: build
    if: github.event.inputs.cliente == 'jkr'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      SSH_HOST: 128.201.75.100
      SSH_PORT: 1158
      SSH_USER: jkrimoveis
      SITE_DIR: ~/public_html/vitrineimob
      SITE_URL: https://jkrimoveispinda.com.br

    steps:
      - name: Baixar artefato de build
        uses: actions/download-artifact@v4
        with:
          name: next-build

      - name: Configurar chave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.JKR_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p $SSH_PORT $SSH_HOST >> ~/.ssh/known_hosts 2>/dev/null
          echo "Chave SSH configurada"

      - name: Verificar zip
        run: |
          echo "=== Tamanho: $(du -sh next-build.zip | cut -f1) ==="
          echo "=== Arquivos: $(unzip -l next-build.zip | tail -1) ==="

      - name: Enviar zip ao servidor
        run: |
          echo "=== Enviando next-build.zip via SCP ==="
          scp -P $SSH_PORT \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 \
              -i ~/.ssh/id_ed25519 \
              next-build.zip $SSH_USER@$SSH_HOST:~/
          echo "Zip enviado com sucesso"

      - name: Instalar no servidor
        run: |
          echo "=== Extraindo e reiniciando no servidor ==="
          ssh -p $SSH_PORT \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 \
              -o ServerAliveInterval=30 \
              -i ~/.ssh/id_ed25519 \
              $SSH_USER@$SSH_HOST \
              "cd $SITE_DIR && \
               rm -rf .next_old && \
               mv .next .next_old && \
               cd ~ && \
               unzip -o next-build.zip -d . && \
               mv ~/app/.next $SITE_DIR/.next && \
               rm -f ~/next-build.zip && \
               cd $SITE_DIR && \
               touch tmp/restart.txt && \
               echo 'Deploy OK em: '\$(date)"
          echo "=== Instalação concluída ==="

      - name: Verificar site após deploy
        run: |
          sleep 8
          HTTP_CODE=$(curl -sk -o /dev/null -w "%{http_code}" "$SITE_URL" || echo "000")
          echo "HTTP status JKR: $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "301" ] || [ "$HTTP_CODE" = "302" ]; then
            echo "=== Deploy JKR finalizado com sucesso em $(date -u) ==="
          else
            echo "AVISO: site retornou HTTP $HTTP_CODE — pode estar reiniciando"
          fi

# ─────────────────────────────────────────────────────────────────────────────
# Para adicionar novos clientes, copie o bloco "deploy-jkr",
# renomeie para "deploy-NOMECLIENTE", ajuste if:, SSH_USER, SITE_DIR e SITE_URL.
# Adicione o secreto SSH_KEY correspondente e o cliente na lista options: acima.
# ─────────────────────────────────────────────────────────────────────────────
