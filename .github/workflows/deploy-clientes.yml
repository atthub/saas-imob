name: Deploy → Clientes

# Disparado manualmente no GitHub → Actions → "Deploy → Clientes" → Run workflow
on:
  workflow_dispatch:
    inputs:
      cliente:
        description: 'Qual cliente atualizar?'
        required: true
        type: choice
        options:
          - jkr          # JKR Imóveis — jkrimoveispinda.com.br
          # Adicione novos clientes aqui no futuro

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Build (compartilhado por todos os clientes)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build:
    name: Build Next.js
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Instalar dependências
        working-directory: app
        run: npm ci

      - name: Build Next.js
        working-directory: app
        env:
          NEXT_TELEMETRY_DISABLED: 1
          DATABASE_URL: "mysql://fake:fake@localhost:3306/fake"
        run: npm run build

      - name: Compactar .next + prisma
        working-directory: app
        run: zip -r ${{ github.workspace }}/next-build.zip .next prisma/schema.prisma prisma/seed.js

      - name: Salvar artefato de build
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: next-build.zip
          retention-days: 1

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Deploy JKR Imóveis
#
# Estratégia definitiva — 100% via HTTPS, sem SSH, sem PHP externo:
#   1. Faz upload do zip via cPanel UAPI (já funciona)
#   2. Chama POST /api/internal/deploy no próprio Next.js
#      → o endpoint extrai o zip, reinicia o Passenger, limpa o zip
#
# O endpoint /api/internal/deploy está no código da app e é protegido
# por Bearer token (variável DEPLOY_SECRET no servidor e no GitHub).
#
# Secrets necessários no GitHub:
#   JKR_CPANEL_USER    → jkrimoveis
#   JKR_CPANEL_TOKEN   → token da API do cPanel
#   JKR_DEPLOY_SECRET  → mesmo valor de DEPLOY_SECRET configurado no servidor
# ─────────────────────────────────────────────────────────────────────────────
  deploy-jkr:
    name: Deploy JKR Imóveis
    needs: build
    if: github.event.inputs.cliente == 'jkr'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CPANEL_HOST:    jkrimoveispinda.com.br:2083
      CPANEL_USER:    ${{ secrets.JKR_CPANEL_USER }}
      CPANEL_TOKEN:   ${{ secrets.JKR_CPANEL_TOKEN }}
      DEPLOY_SECRET:  ${{ secrets.JKR_DEPLOY_SECRET }}
      REMOTE_APP:     /public_html/vitrineimob
      SITE_URL:       https://jkrimoveispinda.com.br
      DEPLOY_ZIP:     deploy-${{ github.run_id }}.zip

    steps:
      - name: Baixar artefato de build
        uses: actions/download-artifact@v4
        with:
          name: next-build

      - name: Verificar zip
        run: |
          echo "=== Tamanho: $(du -sh next-build.zip | cut -f1) ==="
          echo "=== Arquivos: $(unzip -l next-build.zip | tail -1) ==="

      - name: Upload zip para o servidor
        run: |
          echo "=== Enviando $DEPLOY_ZIP ($(du -sh next-build.zip | cut -f1)) ==="
          RESPONSE=$(curl -sk \
            -H "Authorization: cpanel $CPANEL_USER:$CPANEL_TOKEN" \
            -F "dir=$REMOTE_APP" \
            -F "file-1=@next-build.zip;filename=$DEPLOY_ZIP" \
            "https://$CPANEL_HOST/execute/Fileman/upload_files")
          echo "Resposta: $RESPONSE"
          STATUS=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status',0))" 2>/dev/null || echo "0")
          if [ "$STATUS" != "1" ]; then
            echo "ERRO: upload falhou"
            exit 1
          fi

      - name: Acionar deploy via endpoint Next.js
        run: |
          echo "=== Chamando $SITE_URL/api/internal/deploy ==="
          RESPONSE=$(curl -sf --max-time 180 \
            -X POST \
            -H "Authorization: Bearer $DEPLOY_SECRET" \
            -H "Content-Type: application/json" \
            -d "{\"zip\":\"$DEPLOY_ZIP\"}" \
            "$SITE_URL/api/internal/deploy" 2>&1 || echo "CURL_ERROR: $?")
          echo "Resultado: $RESPONSE"
          OK=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('ok',''))" 2>/dev/null || echo "")
          if [ "$OK" != "True" ]; then
            echo "ERRO: deploy via endpoint falhou"
            exit 1
          fi
          echo "=== Deploy concluído ==="

      - name: Verificar site após deploy
        run: |
          sleep 10
          HTTP_CODE=$(curl -sk -o /dev/null -w "%{http_code}" "$SITE_URL" || echo "000")
          echo "HTTP status JKR: $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "301" ] || [ "$HTTP_CODE" = "302" ]; then
            echo "=== Deploy JKR finalizado com sucesso em $(date -u) ==="
          else
            echo "AVISO: site retornou HTTP $HTTP_CODE — pode estar reiniciando"
          fi

# ─────────────────────────────────────────────────────────────────────────────
# Para adicionar novos clientes, copie o bloco "deploy-jkr",
# renomeie para "deploy-NOMECLIENTE", ajuste if:, CPANEL_HOST, REMOTE_APP,
# SITE_URL e crie os secrets correspondentes.
# ─────────────────────────────────────────────────────────────────────────────
