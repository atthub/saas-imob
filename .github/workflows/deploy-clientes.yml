name: Deploy → Clientes

# Disparado manualmente no GitHub → Actions → "Deploy → Clientes" → Run workflow
on:
  workflow_dispatch:
    inputs:
      cliente:
        description: 'Qual cliente atualizar?'
        required: true
        type: choice
        options:
          - jkr          # JKR Imóveis — cPanel sem SSH (FTP via lftp)
          # Adicione novos clientes aqui no futuro

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Build (compartilhado por todos os clientes)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build:
    name: Build Next.js
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Instalar dependências
        working-directory: app
        run: npm ci

      - name: Build Next.js
        working-directory: app
        env:
          NEXT_TELEMETRY_DISABLED: 1
          DATABASE_URL: "mysql://fake:fake@localhost:3306/fake"
        run: npm run build

      - name: Compactar .next
        working-directory: app
        run: zip -r ${{ github.workspace }}/next-build.zip .next

      - name: Salvar artefato de build
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: next-build.zip
          retention-days: 1

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Deploy JKR Imóveis via FTP (lftp mirror)
#
# Abordagem: extrai o zip localmente no runner e faz mirror via FTP.
# Não depende de nenhuma função específica do cPanel.
#
# Secrets necessários em github.com → Settings → Secrets → Actions:
#   JKR_CPANEL_USER  → usuário FTP/cPanel (ex: jkrimoveis)
#   JKR_CPANEL_PASS  → senha FTP/cPanel
#
# Caminho FTP: relativo ao home do usuário no cPanel
#   → public_html/vitrineimob  (equivale a /home/jkrimoveis/public_html/vitrineimob)
# ─────────────────────────────────────────────────────────────────────────────
  deploy-jkr:
    name: Deploy JKR Imóveis
    needs: build
    if: github.event.inputs.cliente == 'jkr'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      FTP_HOST: jkrimoveispinda.com.br
      FTP_USER: ${{ secrets.JKR_CPANEL_USER }}
      FTP_PASS: ${{ secrets.JKR_CPANEL_PASS }}
      # Caminho relativo ao home FTP (= /home/jkrimoveis/ no servidor)
      REMOTE_DIR: public_html/vitrineimob

    steps:
      - name: Baixar artefato de build
        uses: actions/download-artifact@v4
        with:
          name: next-build

      - name: Instalar lftp
        run: sudo apt-get install -y lftp

      - name: Extrair zip localmente
        run: |
          mkdir -p extracted
          unzip -o next-build.zip -d extracted/
          echo "=== Arquivos .next extraídos: $(find extracted/.next -type f | wc -l) arquivos ==="

      - name: Criar restart.txt local (para tocar no servidor)
        run: echo "Deploy em $(date -u)" > /tmp/restart.txt

      - name: Enviar .next via FTP e reiniciar Passenger
        run: |
          echo "=== Iniciando mirror FTP para JKR ==="

          # Escreve o script lftp em arquivo para evitar problemas de escape
          cat > /tmp/lftp-deploy.txt << 'LFTP_SCRIPT'
          set ftp:ssl-allow yes
          set ftp:ssl-force no
          set ssl:verify-certificate no
          set net:timeout 30
          set net:max-retries 3
          set net:reconnect-interval-base 5
          set mirror:parallel-transfer-count 8
          LFTP_SCRIPT

          # Adiciona as linhas com variáveis expandidas pelo shell
          cat >> /tmp/lftp-deploy.txt << LFTP_VARS
          open -u $FTP_USER,$FTP_PASS ftp://$FTP_HOST
          echo "--- Sincronizando pasta .next ---"
          mirror --reverse --parallel=8 --verbose extracted/.next $REMOTE_DIR/.next
          echo "--- Criando pasta tmp ---"
          mkdir -p $REMOTE_DIR/tmp
          echo "--- Tocando restart.txt ---"
          put /tmp/restart.txt -o $REMOTE_DIR/tmp/restart.txt
          echo "=== Deploy JKR concluído! ==="
          bye
          LFTP_VARS

          lftp -f /tmp/lftp-deploy.txt

      - name: Verificar resultado
        run: echo "Deploy JKR finalizado em $(date -u)"

# ─────────────────────────────────────────────────────────────────────────────
# Para adicionar novos clientes, copie o bloco "deploy-jkr" acima,
# renomeie para "deploy-NOMECLIENTE", ajuste if:, FTP_HOST e REMOTE_DIR.
# Adicione o novo cliente na lista options: no topo do arquivo.
# ─────────────────────────────────────────────────────────────────────────────
