name: Deploy para Homologação

on:
  push:
    branches: [main]
  workflow_dispatch: # permite disparar manualmente pelo GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Instalar dependências
        working-directory: app
        run: npm ci

      - name: Build Next.js
        working-directory: app
        env:
          NEXT_TELEMETRY_DISABLED: 1
          # Banco remoto não está disponível no CI — ignorar erros de pré-render
          DATABASE_URL: "mysql://fake:fake@localhost:3306/fake"
        run: npm run build

      - name: Compactar build
        run: zip -r next-build.zip app/.next

      - name: Configurar chave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Enviar e instalar no servidor
        run: |
          # Envia o zip via stdin e instala tudo em uma única sessão SSH
          # (evita bloqueio por duas conexões consecutivas no cPanel/CloudLinux)
          ssh -p ${{ secrets.SSH_PORT }} \
              -o StrictHostKeyChecking=no \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=10 \
              -o ConnectTimeout=60 \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
              "cat > ~/next-build.zip && \
               cd ~/homologacao.attitudehub.com.br && \
               rm -rf .next_old && \
               mv .next .next_old && \
               cd ~ && \
               unzip -o next-build.zip -d . && \
               mv ~/app/.next ~/homologacao.attitudehub.com.br/.next && \
               rm -f ~/next-build.zip && \
               cd ~/homologacao.attitudehub.com.br && \
               touch tmp/restart.txt && \
               echo 'Deploy concluído em: '\$(date)" < next-build.zip
